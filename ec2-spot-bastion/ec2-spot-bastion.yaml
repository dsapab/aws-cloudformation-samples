AWSTemplateFormatVersion: 2010-09-09
# Fn::ForEach (used to fan a fleet of bastions out of one loop) requires the
# AWS::LanguageExtensions transform.
Transform: AWS::LanguageExtensions
Description: >
  EC2 Spot bastion host fleet. One bastion is created per name in BastionNames
  - each with its own launch template, Auto Scaling group, and (when enabled)
  its own Elastic IP and persistent EBS data volume - all in a single stack.
  Each Auto Scaling group is size 1, created for health/recovery and for
  allocating the Spot instance in the cheaper Availability Zone.

##
# Metadata and organisation
#
Metadata:
  # E6101 false positive: cfn-lint cannot resolve the Fn::ForEach-generated
  # logical IDs referenced by the looped Outputs (!Ref {Fn::Sub: ...}), so it
  # invents placeholder names and reports them as unknown. The transform
  # resolves them correctly at deploy time.
  cfn-lint:
    config:
      ignore_checks:
        - E6101
  AWS::CloudFormation::Interface:
    ParameterGroups:
      -
        Label:
          default: "Server settings ..."
        Parameters:
          - BastionNames
          - OSFamily
          - RhelAmiId
          - InstanceType
          - Keypair
      -
        Label:
          default: "Networking ..."
        Parameters:
          - VPC
          - Subnet
          - SourceIP
          - AssignEIP
      -
        Label:
          default: "Persistent storage (optional) ..."
        Parameters:
          - PersistentStorage
          - DataVolumeSize
          - DataMountPoint

##
# Template parameter's
#
Parameters:

  BastionNames:
    Description: >
      Comma-separated list of bastion host names; ONE bastion (with its own
      launch template, Auto Scaling group, and - when enabled - its own
      Elastic IP and persistent data volume) is created per name, all in this
      single stack. Names MUST be alphanumeric (they are used verbatim in
      resource logical IDs), e.g. "bastion1,bastion2". Each name is also the
      instance hostname and the prefix for that host's EIP/volume Name tags.
    Type: CommaDelimitedList
    Default: bastion1

  Subnet:
    Description: The EC2 Instance will be launched in this subnet.
    Type: 'List<AWS::EC2::Subnet::Id>'

  VPC:
    Description: The EC2 Instance will be launched in this VPC.
    Type: AWS::EC2::VPC::Id

  OSFamily:
    Description: >
      Operating system to launch. The latest region-appropriate AMI and the
      matching root device name are BOTH derived automatically from this one
      choice (see the OSMap mapping), so there is nothing else to line up.
      AmazonLinux2023 and Ubuntu resolve their AMI from a public SSM parameter;
      RHEL has no public SSM parameter, so it uses the RhelAmiId value instead.
    Type: String
    Default: AmazonLinux2023
    AllowedValues:
      - AmazonLinux2023
      - Ubuntu
      - RHEL

  RhelAmiId:
    Description: >
      AMI id to use ONLY when OSFamily=RHEL (Red Hat publishes no public SSM
      parameter). Ignored for the other OS families. Leave as-is otherwise.
    Type: String
    Default: ''
    # Empty (unused) or a syntactically valid AMI id.
    AllowedPattern: '^(ami-([0-9a-f]{8}|[0-9a-f]{17}))?$'

  Keypair:
    Description: >
      Optional SSH key pair name. Leave blank to launch without an SSH key
      and rely on SSM Session Manager for access.
    Type: String
    Default: ''

  InstanceType:
    Description: EC2 Instance type.
    Type: String
    Default: t3.large

  SourceIP:
    Description: Source IP, for locking incoming SSH connections.
    Type: String
    AllowedPattern: "^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\\/([0-9]|[1-2][0-9]|3[0-2]))$"
    Default: '0.0.0.0/0'

  AssignEIP:
    Description: >
      'yes' allocates an Elastic IP PER bastion and each instance associates
      its own EIP at boot, giving every bastion a stable public IP that
      survives Spot replacements. 'no' skips the EIPs (and their IAM
      permissions); instances then rely on the subnet's auto-assigned public
      IP, if any, or on SSM Session Manager for access.
    Type: String
    Default: 'yes'
    AllowedValues:
      - 'yes'
      - 'no'

  PersistentStorage:
    Description: >
      'yes' provisions a retained, encrypted EBS data volume PER bastion and
      PINS every instance to a single Availability Zone (chosen automatically)
      so the volumes can re-attach across Spot replacements. 'no' uses ephemeral
      root-only storage and lets Spot place instances in any AZ (cheapest).
    Type: String
    Default: 'no'
    AllowedValues:
      - 'yes'
      - 'no'

  DataVolumeSize:
    Description: Size (GiB) of each persistent data volume. Only used when PersistentStorage=yes.
    Type: Number
    Default: 20
    MinValue: 1
    MaxValue: 200

  DataMountPoint:
    Description: Filesystem path where each persistent data volume is mounted. Only used when PersistentStorage=yes.
    Type: String
    Default: /data

##
# Mappings
#
# Single source of truth that ties each OSFamily to BOTH its AMI source and
# its root device name, so the two can never be mismatched. SsmPath holds the
# public SSM parameter path used to resolve the latest AMI (empty for RHEL,
# which has no public parameter and uses RhelAmiId instead).
Mappings:
  OSMap:
    AmazonLinux2023:
      SsmPath: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
      RootDevice: /dev/xvda
    Ubuntu:
      SsmPath: /aws/service/canonical/ubuntu/server/24.04/stable/current/amd64/hvm/ebs-gp3/ami-id
      RootDevice: /dev/sda1
    RHEL:
      SsmPath: ''
      RootDevice: /dev/xvda

##
# Conditions
#
Conditions:
  # True when a key pair name was supplied; when false the launch template
  # omits KeyName entirely and access is via SSM Session Manager only.
  HasKeypair: !Not [!Equals [!Ref Keypair, '']]

  # True for RHEL, which has no public SSM parameter and therefore takes its
  # AMI id from RhelAmiId rather than a {{resolve:ssm:...}} lookup.
  IsRhel: !Equals [!Ref OSFamily, 'RHEL']

  # True when a persistent EBS data volume should be created per bastion and
  # the ASGs pinned to that volume's AZ.
  UsePersistentStorage: !Equals [!Ref PersistentStorage, 'yes']

  # True when an Elastic IP should be allocated per bastion and self-associated
  # at boot.
  UseEIP: !Equals [!Ref AssignEIP, 'yes']

  # True when the instance role needs any inline policy at all (i.e. the EIP
  # or the data volume is in use). When neither is, the role carries only the
  # SSM managed policy and the inline Policies block is omitted.
  HasInlinePolicy: !Or
    - !Equals [!Ref AssignEIP, 'yes']
    - !Equals [!Ref PersistentStorage, 'yes']

Resources:

  ###
  # Shared security group (all bastions)
  ##
  ASGSpotFletSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allowed Ports
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SourceIP

  ###
  # Shared IAM / instance profile (all bastions)
  ##
  BastionInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
        - Effect: Allow
          Principal:
            Service:
            - ec2.amazonaws.com
          Action:
          - sts:AssumeRole
      Path: /
      # Enables SSM Session Manager access (keyless SSH-free shell), which is
      # the primary access path when no key pair is supplied.
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      # Inline policy is only present when the EIP and/or data volume are in
      # use; otherwise the role carries just the SSM managed policy above.
      # Resource '*' is required because the EIPs/volumes are discovered and
      # associated at boot by tag (their ids are not known at template time).
      Policies: !If
        - HasInlinePolicy
        - - PolicyName: BastionInstanceRole
            PolicyDocument:
              Version: 2012-10-17
              Statement:
              - !If
                - UseEIP
                - Sid: EIPAllocation
                  Effect: Allow
                  Action:
                  # Find (by tag) and associate the CloudFormation-managed EIP.
                  - ec2:DescribeAddresses
                  - ec2:AssociateAddress
                  - ec2:DisassociateAddress
                  Resource: '*'
                - !Ref 'AWS::NoValue'
              - !If
                - UsePersistentStorage
                - Sid: PersistentDataVolume
                  Effect: Allow
                  Action:
                  # Find (by tag) and attach the CloudFormation-managed data volume.
                  - ec2:DescribeVolumes
                  - ec2:AttachVolume
                  Resource: '*'
                - !Ref 'AWS::NoValue'
              # - Sid: S3Access
              #   Effect: Allow
              #   Action:
              #   - s3:Get*
              #   - s3:List*
              #   - s3:Head*
              #   Resource: '*'
        - !Ref 'AWS::NoValue'

  BastionInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
      - !Ref BastionInstanceRole

  ###
  # Per-bastion fleet: one ASG + launch template (+ optional EIP and data
  # volume) generated for each name in BastionNames. The loop identifier is
  # TheHostname, so every '${TheHostname}' below - in logical IDs, tags, and
  # UserData - is replaced by Fn::ForEach with the bastion's name before the
  # rest of the intrinsics (!Sub, !Ref, ...) are evaluated.
  ##
  Fn::ForEach::Bastions:
    - TheHostname
    - !Ref BastionNames

    - 'ASGSpotFlet${TheHostname}':
        Type: AWS::AutoScaling::AutoScalingGroup
        CreationPolicy:
          AutoScalingCreationPolicy:
            MinSuccessfulInstancesPercent: 100
          ResourceSignal:
            Count: 1
            Timeout: PT10M
        UpdatePolicy:
          AutoScalingRollingUpdate:
            MaxBatchSize: 1
            MinInstancesInService: 0
            MinSuccessfulInstancesPercent: 100
            PauseTime: PT10M
            WaitOnResourceSignals: true
        Metadata:
          Comment: "Spot Bastion host"
          AWS::CloudFormation::Init:
            # The UserData shim detects the OS family and invokes cfn-init with
            # '-c apt' or '-c rpm'. cfn-init runs ONLY the configs in the chosen
            # set, so package names are resolved per family declaratively instead
            # of in shell. The 'default' set (files only) is what the cfn-hup
            # auto-reloader re-applies on stack updates.
            configSets:
              default:
                - common
              apt:
                - common
                - apt_packages
              rpm:
                - common
                - rpm_packages
            common:
                files:
                    "/etc/cfn/cfn-hup.conf":
                      content: !Sub |
                        [main]
                        stack=${AWS::StackId}
                        region=${AWS::Region}
                        interval=3
                      mode: "000400"
                      owner: "root"
                      group: "root"

                    "/etc/cfn/hooks.d/cfn-auto-reloader.conf":
                      content: !Sub |
                        [cfn-auto-reloader-hook]
                        triggers=post.update
                        path=Resources.ASGSpotFletLT${TheHostname}.Metadata.AWS::CloudFormation::Init
                        action=/opt/aws/bin/cfn-init -v --stack ${AWS::StackName} --resource ASGSpotFlet${TheHostname} --region ${AWS::Region}
                      mode: "000400"
                      owner: "root"
                      group: "root"
            apt_packages:
                packages:
                    apt:
                        htop: []
                        unzip: []
                        git: []
                        gcc: []
                        curl: []
                        telnet: []
                        nmap: []
                        nvme-cli: []
                        docker.io: []
                        docker-compose: []
            rpm_packages:
                packages:
                    yum:
                        htop: []
                        unzip: []
                        git: []
                        gcc: []
                        curl: []
                        telnet: []
                        nmap: []
                        nvme-cli: []
                        docker: []
        Properties:
          MixedInstancesPolicy:
            InstancesDistribution:
              # Configuring here for 'Full Spot Fleet'
              OnDemandAllocationStrategy: prioritized
              OnDemandBaseCapacity: 0
              OnDemandPercentageAboveBaseCapacity: 0
              SpotAllocationStrategy: lowest-price
              # SpotInstancePools: Integer
              # SpotMaxPrice: String
            LaunchTemplate:
              LaunchTemplateSpecification:
                # Cross-references to a looped logical ID must wrap the loop
                # identifier in Fn::Sub (per AWS::LanguageExtensions docs).
                LaunchTemplateId: !Ref
                  'Fn::Sub': 'ASGSpotFletLT${TheHostname}'
                Version: !GetAtt
                  - !Sub 'ASGSpotFletLT${TheHostname}'
                  - LatestVersionNumber
          MinSize: '1'
          MaxSize: '1'
          DesiredCapacity: '1'
          VPCZoneIdentifier: !Ref Subnet
          # AZ placement:
          #  - Ephemeral (default): no AZ constraint, so Spot places each
          #    instance in whichever of your subnets' AZs is cheapest.
          #  - Persistent: constrain every ASG to the SAME AZ its DataVolume
          #    lives in (!Select [0, !GetAZs ''] - the region's first AZ). The
          #    ASG launches only in the supplied subnet that is in that AZ; if
          #    none exists it fails loudly rather than orphaning the volume.
          #    NOTE: with persistent storage on, all bastions share that one AZ.
          AvailabilityZones: !If
            - UsePersistentStorage
            - - !Select [0, !GetAZs '']
            - !Ref 'AWS::NoValue'
          Tags:
            -
              Key: "Name"
              Value: !Sub '${TheHostname}'
              PropagateAtLaunch: true

      'ASGSpotFletLT${TheHostname}':
        Type: AWS::EC2::LaunchTemplate
        Metadata:
          # W1030 false positive: linter checks RhelAmiId's empty default against
          # the AMI-id pattern without following the !If [IsRhel, ...] guard. The
          # empty value only reaches ImageId when OSFamily=RHEL, in which case a
          # valid id is required (and enforced by the parameter's AllowedPattern).
          cfn-lint:
            config:
              ignore_checks:
                - W1030
        Properties:
          LaunchTemplateData:
            # AMI: RHEL uses the raw id (no public SSM param); the others resolve
            # the latest region-appropriate AMI from the SSM path in OSMap.
            ImageId: !If
              - IsRhel
              - !Ref RhelAmiId
              - !Sub
                - '{{resolve:ssm:${Path}}}'
                - Path: !FindInMap [OSMap, !Ref OSFamily, SsmPath]
            InstanceType: !Ref InstanceType
            KeyName: !If [HasKeypair, !Ref Keypair, !Ref 'AWS::NoValue']
            SecurityGroupIds: [ !Ref ASGSpotFletSG ]
            IamInstanceProfile:
              Name: !Ref BastionInstanceProfile
            BlockDeviceMappings:
              # Root device name is derived from OSFamily, so it always matches
              # the AMI (otherwise the size override would be silently ignored).
              - DeviceName: !FindInMap [OSMap, !Ref OSFamily, RootDevice]
                Ebs:
                  VolumeSize: 25
            UserData:
              Fn::Base64:
                !Sub |
                  #!/bin/bash -xe

                  ###
                  # OS-agnostic package-manager abstraction.
                  # Supports apt (Debian/Ubuntu) and dnf/yum (Amazon Linux, RHEL,
                  # CentOS, Rocky). Everything below is expressed through these
                  # helpers so the same UserData boots on any of those families.
                  ##
                  # PKG drives the shell helpers; CFN_CONFIGSET selects which
                  # cfn-init packages block runs (apt block vs yum/rpm block).
                  if command -v dnf >/dev/null 2>&1; then
                    PKG=dnf; CFN_CONFIGSET=rpm
                  elif command -v yum >/dev/null 2>&1; then
                    PKG=yum; CFN_CONFIGSET=rpm
                  elif command -v apt-get >/dev/null 2>&1; then
                    PKG=apt; CFN_CONFIGSET=apt
                  else
                    echo "No supported package manager (dnf/yum/apt) found" >&2
                    exit 1
                  fi

                  pkg_update() {
                    case "$PKG" in
                      apt) apt-get update && DEBIAN_FRONTEND=noninteractive apt-get -y \
                             -o Dpkg::Options::="--force-confdef" \
                             -o Dpkg::Options::="--force-confold" upgrade ;;
                      dnf) dnf -y upgrade ;;
                      yum) yum -y update ;;
                    esac
                  }

                  pkg_install() {
                    case "$PKG" in
                      apt) DEBIAN_FRONTEND=noninteractive apt-get install -y "$@" ;;
                      dnf) dnf install -y "$@" ;;
                      yum) yum install -y "$@" ;;
                    esac
                  }

                  # Update && upgrade
                  pkg_update

                  ## CFN Initialization ##

                  # aws CLI is preinstalled on Amazon Linux; install it elsewhere.
                  command -v aws >/dev/null 2>&1 || pkg_install awscli

                  # Locate cfn-bootstrap (preinstalled at /opt/aws/bin on Amazon
                  # Linux) or install the Python 3 build (Debian/Ubuntu/RHEL).
                  if [ -x /opt/aws/bin/cfn-init ]; then
                    CFN_BIN=/opt/aws/bin
                  elif [ -x /usr/local/bin/cfn-init ]; then
                    CFN_BIN=/usr/local/bin
                  else
                    pkg_install python3-pip
                    pip3 install https://s3.amazonaws.com/cloudformation-examples/aws-cfn-bootstrap-py3-latest.tar.gz
                    CFN_BIN=/usr/local/bin
                  fi

                  # Normalize the cfn binaries under /opt/aws/bin so the static
                  # cfn-hup reloader hook path is valid regardless of OS family.
                  if [ "$CFN_BIN" != "/opt/aws/bin" ]; then
                    mkdir -p /opt/aws/bin
                    for b in cfn-init cfn-hup cfn-signal cfn-get-metadata; do
                      [ -x "/opt/aws/bin/$b" ] || ln -sf "$CFN_BIN/$b" "/opt/aws/bin/$b"
                    done
                  fi

                  # From here on, signal failure to CloudFormation on any error so
                  # the stack fails fast instead of waiting for the timeout.
                  trap '/opt/aws/bin/cfn-signal -e 1 --stack ${AWS::StackId} --resource ASGSpotFlet${TheHostname} --region ${AWS::Region}' ERR

                  # Run cfn-init with the OS-specific config set. cfn-init installs
                  # the files (common) and the packages block for this family
                  # (apt_packages or rpm_packages) declaratively from the Metadata.
                  /opt/aws/bin/cfn-init -v -c $CFN_CONFIGSET \
                    -s ${AWS::StackId} -r ASGSpotFlet${TheHostname} --region ${AWS::Region}

                  # Start cfn-hup daemon so it keeps listening for Metadata changes.
                  /opt/aws/bin/cfn-hup

                  ## Extras that cfn-init's declarative 'packages' can't express ##
                  # Kernel headers must be pinned to the running kernel via uname,
                  # which is a runtime value with no static package name.
                  case "$PKG" in
                    apt)
                      pkg_install "linux-headers-$(uname -r)"
                      ;;
                    dnf|yum)
                      pkg_install "kernel-devel-$(uname -r)"
                      # Compose is a dnf plugin on RHEL-family repos, not a package.
                      pkg_install docker-compose-plugin || true
                      ;;
                  esac

                  # Enable the docker daemon if it was installed.
                  systemctl enable --now docker 2>/dev/null || true

                  # Ensure the SSM agent is present and running so Session Manager
                  # works (primary access path when no key pair is supplied).
                  # Preinstalled on Amazon Linux; install elsewhere. Service name is
                  # 'amazon-ssm-agent' (rpm) or 'snap.amazon-ssm-agent.amazon-ssm-agent'
                  # on Ubuntu (snap), so enable whichever unit exists.
                  if ! systemctl list-unit-files 2>/dev/null | grep -q ssm-agent; then
                    case "$PKG" in
                      apt) snap install amazon-ssm-agent --classic 2>/dev/null || \
                           pkg_install amazon-ssm-agent || true ;;
                      dnf|yum) pkg_install amazon-ssm-agent || true ;;
                    esac
                  fi
                  systemctl enable --now amazon-ssm-agent 2>/dev/null || \
                    systemctl enable --now snap.amazon-ssm-agent.amazon-ssm-agent 2>/dev/null || true

                  # IMDSv2 token (used for both the data volume and the EIP below).
                  TOKEN=$(curl -s -X PUT "http://169.254.169.254/latest/api/token" \
                            -H "X-aws-ec2-metadata-token-ttl-seconds: 300" || true)
                  imds() { curl -s -H "X-aws-ec2-metadata-token: $TOKEN" \
                            "http://169.254.169.254/latest/meta-data/$1"; }
                  INSTANCE_ID=$(imds instance-id)

                  ## Persistent data volume (attach the CloudFormation-managed EBS) ##
                  # Only when PersistentStorage=yes. The volume is created and owned
                  # by CloudFormation (the DataVolume resource) in the same AZ the
                  # ASG is pinned to; here we just find it by its Name tag, attach,
                  # and mount. Data survives because we format ONLY when it's blank.
                  if [ "${PersistentStorage}" = "yes" ]; then
                    AZ=$(imds placement/availability-zone)
                    VOL_NAME="${TheHostname}-data"
                    MP="${DataMountPoint}"

                    # ASG and DataVolume are created concurrently (no static
                    # DependsOn is possible on a conditional resource), so poll
                    # until CloudFormation has created the volume.
                    VOL_ID=""
                    for i in $(seq 1 30); do
                      VOL_ID=$(aws --region ${AWS::Region} ec2 describe-volumes \
                        --filters "Name=tag:Name,Values=$VOL_NAME" \
                                  "Name=availability-zone,Values=$AZ" \
                        --query 'Volumes[0].VolumeId' --output text)
                      [ "$VOL_ID" != "None" ] && [ -n "$VOL_ID" ] && break
                      sleep 10
                    done

                    aws --region ${AWS::Region} ec2 wait volume-available --volume-ids "$VOL_ID"
                    aws --region ${AWS::Region} ec2 attach-volume \
                      --volume-id "$VOL_ID" --instance-id "$INSTANCE_ID" --device /dev/sdf

                    # Resolve the device: Nitro renames /dev/sdf to a /dev/nvmeXn1
                    # whose serial encodes the volume id (vol-xxxx, no dash).
                    VOL_SERIAL=$(echo "$VOL_ID" | tr -d '-')
                    DEV=""
                    for i in $(seq 1 30); do
                      if [ -e /dev/sdf ]; then DEV=/dev/sdf; break; fi
                      for d in /dev/nvme*n1; do
                        [ -e "$d" ] || continue
                        if nvme id-ctrl -v "$d" 2>/dev/null | grep -q "$VOL_SERIAL"; then
                          DEV="$d"; break
                        fi
                      done
                      [ -n "$DEV" ] && break
                      sleep 2
                    done

                    # Format only if there is no filesystem yet (preserves data).
                    if ! blkid "$DEV" >/dev/null 2>&1; then
                      mkfs.ext4 -L bastion-data "$DEV"
                    fi

                    # Mount by UUID via fstab (nofail so a bad volume never blocks boot).
                    mkdir -p "$MP"
                    UUID=$(blkid -s UUID -o value "$DEV")
                    if ! grep -q "$UUID" /etc/fstab; then
                      echo "UUID=$UUID $MP ext4 defaults,nofail 0 2" >> /etc/fstab
                    fi
                    mount -a
                  fi

                  # Change hostname (systemd first, fall back to legacy).
                  hostnamectl set-hostname ${TheHostname} 2>/dev/null || {
                    hostname ${TheHostname}
                    echo ${TheHostname} > /etc/hostname
                  }

                  ## Associate the Elastic IP (only when AssignEIP=yes) ##
                  # The EIP is a CloudFormation-managed resource tagged for this
                  # host; look up its allocation id by tag and associate it to
                  # this instance so a stable public IP survives Spot replacements.
                  if [ "${AssignEIP}" = "yes" ]; then
                    sleep 15
                    ALLOC_ID=$(aws --region ${AWS::Region} ec2 describe-addresses \
                      --filters "Name=tag:Name,Values=${TheHostname}-eip" \
                      --query 'Addresses[0].AllocationId' --output text)
                    aws --region ${AWS::Region} ec2 associate-address \
                              --instance-id "$INSTANCE_ID" \
                              --allocation-id "$ALLOC_ID"
                  fi

                  # Set SSH keepalive (~4h idle: 60m interval x 4).
                  sed -i "/ClientAliveInterval/c\ClientAliveInterval 60m" /etc/ssh/sshd_config
                  sed -i "/ClientAliveCountMax/c\ClientAliveCountMax 4" /etc/ssh/sshd_config
                  # sshd service is 'ssh' on Debian/Ubuntu, 'sshd' on RHEL-family.
                  systemctl restart sshd 2>/dev/null || systemctl restart ssh

                  # As a last step, signal success to the stack.
                  /opt/aws/bin/cfn-signal -e 0 --stack ${AWS::StackId} --resource ASGSpotFlet${TheHostname} --region ${AWS::Region}

      ###
      # Per-bastion EIP (only when AssignEIP=yes)
      ##
      'BastionEIP${TheHostname}':
        Type: AWS::EC2::EIP
        Condition: UseEIP
        Properties:
          Domain: vpc
          Tags:
            - Key: Name
              Value: !Sub '${TheHostname}-eip'

      ###
      # Per-bastion persistent data volume (only when PersistentStorage=yes)
      ##
      # A first-class, CloudFormation-managed EBS volume. Its AvailabilityZone
      # is the same !Select [0, !GetAZs ''] the ASG is constrained to, so the
      # volume and the instance always co-locate. Retained on stack delete so
      # data is not lost; the attach happens at boot in UserData (an ASG has no
      # static instance id for AWS::EC2::VolumeAttachment to reference).
      'DataVolume${TheHostname}':
        Type: AWS::EC2::Volume
        Condition: UsePersistentStorage
        DeletionPolicy: Retain
        UpdateReplacePolicy: Retain
        Properties:
          AvailabilityZone: !Select [0, !GetAZs '']
          Size: !Ref DataVolumeSize
          VolumeType: gp3
          Encrypted: true
          Tags:
            - Key: Name
              Value: !Sub '${TheHostname}-data'


###
# Outputs (one set per bastion)
##
Outputs:
  # A per-output 'Condition:' key inside an Outputs Fn::ForEach breaks the
  # AWS::LanguageExtensions transform ("Condition layout is incorrect"), and
  # AWS::NoValue cannot stand in as an entire output Value. So instead of
  # conditioning each output, we condition the COLLECTION each loop iterates:
  # !If [Cond, BastionNames, []] yields the full name list when the feature is
  # on and an empty list (zero outputs) when it is off.
  Fn::ForEach::EIPOutputs:
    - TheHostname
    - !If [UseEIP, !Ref BastionNames, []]
    - 'Bastion${TheHostname}EIP':
        Description: !Sub 'Elastic IP address of bastion ${TheHostname}.'
        # Cross-reference to a looped logical ID must wrap it in Fn::Sub.
        Value: !Ref
          'Fn::Sub': 'BastionEIP${TheHostname}'

  Fn::ForEach::DataOutputs:
    - TheHostname
    - !If [UsePersistentStorage, !Ref BastionNames, []]
    - 'Bastion${TheHostname}DataMount':
        Description: !Sub 'Mount point of the persistent data volume on bastion ${TheHostname}.'
        Value: !Ref DataMountPoint
